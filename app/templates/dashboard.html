{% extends 'layout.html' %}{% block content %}<div class='row'>{% for t,v,c in cards %}<div class='col'><div class='card border-{{c}}'><div class='card-body'><small>{{t}}</small><h3>{{v}}</h3></div></div></div>{% endfor %}</div><table id='props'><thead><tr><th>Property</th><th>Occupied</th></tr></thead><tbody>{% for p in props %}<tr><td>{{p.name}}</td><td>{{p.units}}</td></tr>{% endfor %}</tbody></table>{% endblock %}
