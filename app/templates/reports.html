{% extends "layout.html" %}
{% block content %}
<div class="row">
{% for name, desc in reports %}
<div class="col-md-6 col-xl-3 mb-4">
  <div class="card h-100 report-card">
    <div class="card-body">
      <div class="report-icon"><i class="fas fa-file-chart-column"></i></div>
      <h5>{{ name }}</h5>
      <p class="text-muted">{{ desc }}</p>
      <button class="btn btn-outline-primary btn-sm">Open Report</button>
    </div>
  </div>
</div>
{% endfor %}
</div>
{% endblock %}
